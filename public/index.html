<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-people-fill me-2"></i>
                Sistema de Cadastro
            </a>
        </div>
    </nav>

    <div class="container py-5">
        
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">
                <i class="bi bi-person-lines-fill me-2"></i>
                Sistema de Cadastro
            </h1>
        </div>

        <div id="conteudo" class="card shadow p-4 fade-in">
        </div>

        <div id="formulario" class="card shadow p-4 fade-in" style="display: none;">
            <div class="d-flex align-items-center border-bottom pb-3 mb-4">
                <i class="bi bi-person-plus-fill fs-3 text-primary me-3"></i>
                <h3 class="mb-0">Dados da Pessoa</h3>
            </div>
            
            <input type="hidden" id="txtid">
            
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-person me-1"></i> Nome Completo
                    </label>
                    <input type="text" id="txtnome" class="form-control form-control-lg" placeholder="Digite o nome completo">
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-telephone me-1"></i> Telefone
                    </label>
                    <input type="text" id="txttelefone" class="form-control form-control-lg" placeholder="(00) 00000-0000">
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-envelope me-1"></i> Email
                    </label>
                    <input type="email" id="txtemail" class="form-control form-control-lg" placeholder="email@exemplo.com">
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                <button class="btn btn-outline-secondary px-4 py-2" onclick="cancelar()">
                    <i class="bi bi-x-circle me-1"></i> Cancelar
                </button>
                <button class="btn btn-success px-4 py-2" onclick="salvar()">
                    <i class="bi bi-check-circle me-1"></i> Salvar Dados
                </button>
            </div>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
